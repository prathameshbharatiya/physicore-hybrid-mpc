# PhysiCore — Sounding Rocket Config
# Only change these two values:
#   connection: your flight computer's COM port
#   mass: your rocket's dry mass in kg (without propellant)

name: My Rocket
platform: rocket
connection: COM3
baud: 115200
mass: 5.0
friction: 0.45
inertia: 220
control_hz: 60.0
use_registry: true
opt_in_telemetry: false
sentinel_enabled: true
