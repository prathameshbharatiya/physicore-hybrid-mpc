name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PhysiCore and test dependencies
        run: |
          pip install -e . --quiet
          pip install pytest pytest-cov numpy --quiet

      - name: Run pytest
        id: pytest
        run: |
          pytest tests/ -v --tb=short \
            --junitxml=pytest-results.xml \
            2>&1 | tee pytest-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: pytest-results.xml

      - name: Comment test results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('pytest-output.txt', 'utf8');
            const lines = output.split('\n');
            // Find summary line
            const summary = lines.find(l => l.includes('passed') || l.includes('failed') || l.includes('error')) || 'No summary found';
            const passed = (output.match(/(\d+) passed/)?.[1]) || '0';
            const failed = (output.match(/(\d+) failed/)?.[1]) || '0';
            const skipped = (output.match(/(\d+) skipped/)?.[1]) || '0';
            const icon = failed === '0' ? '✅' : '❌';
            const body = `## ${icon} Python Test Results\n\n| Result | Count |\n|--------|-------|\n| ✅ Passed | ${passed} |\n| ❌ Failed | ${failed} |\n| ⏭️ Skipped | ${skipped} |\n\n<details><summary>Full output</summary>\n\n\`\`\`\n${output.slice(-3000)}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run lint

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-python, typecheck]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: physicore:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
