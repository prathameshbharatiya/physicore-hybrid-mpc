# PhysiCore CI/CD
# ─────────────────────────────────────────────────────────────────────────────
# Tests run on every push and pull request.
# PyPI publish runs only when you push a version tag: git tag v2.1.0 && git push --tags
#
# Required GitHub secrets:
#   PYPI_API_TOKEN   — from pypi.org/manage/account/token/
#   TEST_PYPI_TOKEN  — from test.pypi.org (optional, for pre-release testing)

name: CI / Publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  # ── Tests — run on every push ──────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          PHYSICORE_SKIP_AUTH: "1"
        run: |
          pytest tests/ -v --tb=short --cov=physicore --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ── Build — verify package builds cleanly ─────────────────────────────────
  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Publish to PyPI — only on version tags ─────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/physicore/

    permissions:
      id-token: write   # Required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses OIDC trusted publishing — no API token needed if configured on PyPI
          # Alternatively, use: password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # ── GitHub Release — create release notes on tag ───────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PhysiCore v${{ steps.version.outputs.VERSION }}
          body: |
            ## PhysiCore v${{ steps.version.outputs.VERSION }}

            Install:
            ```bash
            pip install physicore==${{ steps.version.outputs.VERSION }}
            pip install "physicore[all]==${{ steps.version.outputs.VERSION }}"
            ```

            See [CHANGELOG.md](CHANGELOG.md) for what changed.
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
